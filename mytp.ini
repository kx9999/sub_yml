[custom]
;========================
; 分组定义
;========================
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🇹🇼 台湾`[]🌍 其他地区`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🇭🇰 香港`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🌍 其他地区`[]🚀 节点选择
custom_proxy_group=🤖 AI`select`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🌍 其他地区`[]🚀 节点选择
custom_proxy_group=📲 Telegram`select`[]🇭🇰 香港`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🌍 其他地区`[]🚀 节点选择
custom_proxy_group=🔍 Google`select`[]🇭🇰 香港`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🌍 其他地区`[]🚀 节点选择
custom_proxy_group=📺 YouTube`select`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🌍 其他地区`[]🚀 节点选择
custom_proxy_group=🎵 TikTok`select`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇺🇸 美国`[]🌍 其他地区`[]🚀 节点选择

custom_proxy_group=🎯 直连`select`[]DIRECT`[]🚀 节点选择

;========================
; 地区分组
;========================
custom_proxy_group=🇭🇰 香港`url-test`(港|HK|Hong Kong|香港|🇭🇰)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡`url-test`(新加坡|SG|Singapore|🇸🇬)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本`url-test`(日本|JP|Japan|东京|大阪|🇯🇵)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国`url-test`(美国|US|USA|United States|洛杉矶|硅谷|🇺🇸)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾`url-test`(台湾|TW|Taiwan|台北|新北|🇹🇼)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌍 其他地区`select`[]♻️ 自动选择`.*`

;========================
; 规则集（按顺序命中）
;========================

; 拦截（固定 REJECT，不给切换，防污染）
ruleset=REJECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt

; Apple（默认建议 DIRECT，可在组里手动切代理）
ruleset=🍎 Apple,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt

; AI
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml

; 常用国外服务
ruleset=📲 Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Telegram.yaml
ruleset=🔍 Google,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Google.yaml
ruleset=📺 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/YouTube.yaml
ruleset=🎵 TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.yaml

; 直连（你指定）
ruleset=🎯 直连,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
ruleset=🎯 直连,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt
ruleset=🎯 直连,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
ruleset=🎯 直连,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt

; 兜底
ruleset=🚀 节点选择,[]FINAL

enable_rule_generator=true
overwrite_original_rules=true
